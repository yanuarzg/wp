ent;font-weight:900;line-height:1.1;cursor:pointer;transition:transform .18s ease,box-shadow .18s ease,background .18s ease,color .18s ease,border-color .18s ease}.btn:hover{transform:translateY(-2px)}.btn-primary{background:linear-gradient(135deg,var(--np-primary),var(--np-primary-2));color:#fff;box-shadow:0 16px 34px rgba(10,77,162,.28)}.btn-primary:hover{box-shadow:0 22px 44px rgba(10,77,162,.34)}.btn-soft{background:#fff;color:var(--np-primary);border-color:var(--np-border);box-shadow:0 12px 26px rgba(15,23,42,.06)}.btn-dark{background:#101827;color:#fff;box-shadow:0 16px 36px rgba(15,23,42,.24)}.section{padding:86px 0}.hero{padding:82px 0 74px}.hero-grid{display:grid;grid-template-columns:minmax(0,1.02fr) minmax(360px,.98fr);gap:48px;align-items:center}.eyebrow{display:inline-flex;align-items:center;gap:9px;padding:8px 12px;border:1px solid rgba(10,77,162,.14);background:rgba(255,255,255,.74);border-radius:999px;color:var(--np-primary);font-weight:900;font-size:13px;box-shadow:0 10px 30px rgba(15,23,42,.05)}.eyebrow i{width:9px;height:9px;border-radius:50%;background:var(--np-green);box-shadow:0 0 0 6px rgba(22,163,74,.13)}h1,h2,h3{color:var(--np-ink);line-height:1.05;margin:0;letter-spacing:-.05em}</style></head><body><header><div class="container"><div class="header-content"><div class="brand"><div class="brand-mark">NP</div><div><span>NewsPress</span><small>Theme</small></div></div><nav class="nav-menu"><a href="#features">Features</a><a href="#pricing">Pricing</a><a href="#docs">Docs</a></nav><div class="nav-cta"><a href="#" class="btn btn-primary">Get Started</a></div></div></div></header><main><section class="section hero"><div class="container"><div class="hero-grid"><div><div class="eyebrow"><i></i><span>Modern WordPress Theme</span></div><h1>NewsPress</h1><p>A modern, fast, and beautiful WordPress theme for your news and magazine website.</p><a href="#" class="btn btn-primary" style="margin-top: 24px;">Download Now</a></div><div style="background: line
